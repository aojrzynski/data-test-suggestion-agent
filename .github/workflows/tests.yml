name: tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package with test dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Smoke test installed CLI
        run: |
          data-test-suggestion-agent --help
          data-test-suggestion-agent --version
          rm -rf outputs
          data-test-suggestion-agent --output-dir outputs
          test -f outputs/data_test_trace.json
          python -m json.tool outputs/data_test_trace.json
          rm -rf outputs
          data-test-suggestion-agent --input sample_data/customers/customers_for_test_suggestions.csv --output-dir outputs
          test -f outputs/data_test_trace.json
          test -f outputs/dataset_profile.json
          python -m json.tool outputs/data_test_trace.json
          python -m json.tool outputs/dataset_profile.json
